<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rational Edge | Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0a; --card: #171717; --silver: #e5e5e5; --border: #262626; --accent: #d4d4d8; --danger: #ef4444; --success: #22c55e; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--silver); margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 1200px; margin: auto; opacity: 0; transition: opacity 0.5s ease; display: none; }
        .container.visible { opacity: 1; display: block; }
        
        #terminalAuth { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; align-items: center; justify-content: center; flex-direction: column; text-align: center; }
        .terminal-box { border: 1px solid var(--border); padding: 40px; border-radius: 8px; background: var(--card); }
        
        header { border-bottom: 1px solid var(--border); padding: 20px 0; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 1.4rem; letter-spacing: 1px; text-transform: uppercase; margin: 0; }
        
        .btn { background: var(--accent); color: #000; border: none; padding: 10px 20px; border-radius: 4px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 0.85rem; }
        .btn:hover { opacity: 0.8; transform: translateY(-1px); }
        .btn-outline { background: transparent; color: var(--silver); border: 1px solid var(--border); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 25px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; position: relative; }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 20px; }
        th { text-align: left; color: #737373; border-bottom: 1px solid var(--border); padding: 10px 5px; font-weight: 400; }
        td { padding: 12px 5px; border-bottom: 1px solid #1f1f1f; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 50; backdrop-filter: blur(4px); overflow-y: auto; }
        .modal-content { background: var(--card); margin: 2% auto; padding: 30px; border: 1px solid var(--border); max-width: 480px; border-radius: 12px; }
        
        label { display: block; font-size: 0.7rem; color: #737373; text-transform: uppercase; margin-bottom: 4px; margin-top: 12px; }
        input, select { background: #000; border: 1px solid var(--border); color: white; padding: 12px; width: 100%; box-sizing: border-box; border-radius: 6px; outline: none; font-family: inherit; }
        input:focus { border-color: var(--accent); }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    </style>
</head>
<body>

    <div id="terminalAuth">
        <div class="terminal-box">
            <h2 style="margin-bottom: 20px; color: white;">RATIONAL EDGE <span style="font-weight: 300;">TERMINAL</span></h2>
            <input type="password" id="pinInput" placeholder="ENTER ACCESS PIN" style="max-width: 220px; text-align: center; letter-spacing: 4px;">
            <br><br>
            <button class="btn" onclick="authenticate()">INITIALIZE SYSTEM</button>
        </div>
    </div>

    <div class="container" id="mainApp">
        <header>
            <h1>Rational Edge <span style="font-weight: 300; color: #737373;">Manager</span></h1>
            <button class="btn" onclick="toggleModal('serviceModal', true)">+ NEW SERVICE</button>
        </header>
        <div id="dashboard" class="grid"></div>
    </div>

    <div id="serviceModal" class="modal">
        <div class="modal-content">
            <h3>Configure Service</h3>
            <label>Service Name</label>
            <input type="text" id="sName" placeholder="e.g. Crypto Signals">
            <label>Pricing Model</label>
            <select id="sPriceType" onchange="document.getElementById('sPriceContainer').style.display = this.value === 'Fixed' ? 'block' : 'none'">
                <option value="Fixed">Fixed Price</option>
                <option value="Variable">Variable (Per Client)</option>
            </select>
            <div id="sPriceContainer">
                <label>Base Monthly Price ($)</label>
                <input type="number" id="sPrice" value="0">
            </div>
            <div style="display: flex; gap: 10px; margin-top: 30px;">
                <button class="btn" style="flex:1" onclick="createService()">SAVE SERVICE</button>
                <button class="btn btn-outline" onclick="toggleModal('serviceModal', false)">CANCEL</button>
            </div>
        </div>
    </div>

    <div id="clientModal" class="modal">
        <div class="modal-content">
            <h3 id="clientModalTitle">Manage Client</h3>
            <input type="hidden" id="editClientId">
            <input type="hidden" id="targetService">
            
            <label>Full Name</label>
            <input type="text" id="cName">

            <div id="cPriceWrapper">
                <label>Subscription Price ($)</label>
                <input type="number" id="cPrice">
            </div>

            <label>Joined Date (First Time)</label>
            <input type="date" id="cJoined">

            <div class="row">
                <div>
                    <label>Subscribed Date</label>
                    <input type="date" id="cSubscribed" onchange="calculateExpiry()">
                </div>
                <div>
                    <label>Duration (Days)</label>
                    <input type="number" id="cDuration" oninput="calculateExpiry()">
                </div>
            </div>

            <label>Expiry Date (Auto-Calculated)</label>
            <input type="date" id="cExpiry" readonly style="background:#111; color:#737373; cursor:not-allowed; border-style: dashed;">

            <div style="display: flex; gap: 10px; margin-top: 30px;">
                <button class="btn" style="flex:1" onclick="saveClient()">SAVE CLIENT DATA</button>
                <button class="btn btn-outline" style="flex:1" onclick="toggleModal('clientModal', false)">CANCEL</button>
            </div>
            <button id="deleteClientBtn" class="btn" style="width:100%; margin-top:10px; background:transparent; color:var(--danger); border:1px solid #331111; display:none;" onclick="deleteClient()">DELETE CLIENT</button>
        </div>
    </div>

    <script>
        const CONFIG = {
            SB_URL: 'https://ehbhfdpnwzmpcoptsdpq.supabase.co',
            SB_KEY: 'sb_publishable_42r3MUVCV27UH9mViL64xA_09w_cfov',
            MASTER_PIN: '4321',
            TELEGRAM: { ENABLED: false, TOKEN: '', CHAT: '' }
        };

        const _supabase = supabase.createClient(CONFIG.SB_URL, CONFIG.SB_KEY);

        function authenticate() {
            if(document.getElementById('pinInput').value === CONFIG.MASTER_PIN) {
                document.getElementById('terminalAuth').style.display = 'none';
                document.getElementById('mainApp').classList.add('visible');
                loadData();
            } else { alert("INVALID PIN"); }
        }

        async function loadData() {
            const { data: services } = await _supabase.from('services').select('*').order('name');
            const { data: clients } = await _supabase.from('clients').select('*');
            renderDashboard(services || [], clients || []);
        }

        function calculateExpiry() {
            const start = document.getElementById('cSubscribed').value;
            const days = parseInt(document.getElementById('cDuration').value);
            if(start && days) {
                const d = new Date(start);
                d.setDate(d.getDate() + days);
                document.getElementById('cExpiry').value = d.toISOString().split('T')[0];
            }
        }

        function renderDashboard(services, clients) {
            const dash = document.getElementById('dashboard');
            dash.innerHTML = services.length === 0 ? '<p style="color:#444">No services active.</p>' : '';
            
            services.forEach(s => {
                const sClients = clients.filter(c => c.service_name === s.name);
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <h2 style="margin:0; font-size:1.1rem;">${s.name}</h2>
                        <button onclick="deleteService('${s.name}')" style="background:none; border:none; color:#444; cursor:pointer;">✕</button>
                    </div>
                    <table>
                        <thead><tr><th>CLIENT</th><th>EXPIRY</th></tr></thead>
                        <tbody>
                            ${sClients.map(c => {
                                const days = Math.ceil((new Date(c.expiry_date) - new Date()) / 86400000);
                                const color = days <= 3 ? 'var(--danger)' : 'var(--success)';
                                return `<tr>
                                    <td onclick='openEditModal(${JSON.stringify(c)})' style="cursor:pointer; font-weight:600;">${c.name}</td>
                                    <td style="color:${color}">${days <= 0 ? 'EXPIRED' : days + 'd'}</td>
                                </tr>`;
                            }).join('') || '<tr><td colspan="2" style="color:#444">No Clients</td></tr>'}
                        </tbody>
                    </table>
                    <button class="btn" style="width:100%; margin-top:20px; font-size:0.7rem;" 
                            onclick="openAddModal('${s.name}', '${s.price_type}', '${s.base_price}')">+ ADD CLIENT</button>
                `;
                dash.appendChild(card);
            });
        }

        function toggleModal(id, show) { document.getElementById(id).style.display = show ? 'block' : 'none'; }

        function openAddModal(sName, type, price) {
            document.getElementById('clientModalTitle').innerText = "Add Client to " + sName;
            document.getElementById('editClientId').value = '';
            document.getElementById('targetService').value = sName;
            document.getElementById('cName').value = '';
            document.getElementById('cPrice').value = price;
            document.getElementById('cJoined').value = new Date().toISOString().split('T')[0];
            document.getElementById('cSubscribed').value = new Date().toISOString().split('T')[0];
            document.getElementById('cDuration').value = 30;
            document.getElementById('deleteClientBtn').style.display = 'none';
            calculateExpiry();
            toggleModal('clientModal', true);
        }

        function openEditModal(c) {
            document.getElementById('clientModalTitle').innerText = "Update " + c.name;
            document.getElementById('editClientId').value = c.id;
            document.getElementById('targetService').value = c.service_name;
            document.getElementById('cName').value = c.name;
            document.getElementById('cPrice').value = c.price_paid;
            document.getElementById('cJoined').value = c.joined_date;
            document.getElementById('cSubscribed').value = c.subscribed_date || c.joined_date;
            document.getElementById('cDuration').value = c.duration || 30;
            document.getElementById('deleteClientBtn').style.display = 'block';
            calculateExpiry();
            toggleModal('clientModal', true);
        }

        async function saveClient() {
            const id = document.getElementById('editClientId').value;
            const data = {
                name: document.getElementById('cName').value,
                service_name: document.getElementById('targetService').value,
                price_paid: document.getElementById('cPrice').value,
                joined_date: document.getElementById('cJoined').value,
                subscribed_date: document.getElementById('cSubscribed').value,
                duration: document.getElementById('cDuration').value,
                expiry_date: document.getElementById('cExpiry').value
            };

            const query = id ? _supabase.from('clients').update(data).eq('id', id) : _supabase.from('clients').insert([data]);
            const { error } = await query;
            if(error) alert(error.message); else { toggleModal('clientModal', false); loadData(); }
        }

        async function createService() {
            const name = document.getElementById('sName').value;
            const type = document.getElementById('sPriceType').value;
            const price = document.getElementById('sPrice').value;
            await _supabase.from('services').insert([{ name, price_type: type, base_price: price }]);
            toggleModal('serviceModal', false); loadData();
        }

        async function deleteClient() {
            const id = document.getElementById('editClientId').value;
            if(confirm("Permanently remove this client?")) {
                await _supabase.from('clients').delete().eq('id', id);
                toggleModal('clientModal', false); loadData();
            }
        }

        async function deleteService(name) {
            if(confirm(`Delete ${name} and all associated clients?`)) {
                await _supabase.from('services').delete().eq('name', name);
                await _supabase.from('clients').delete().eq('service_name', name);
                loadData();
            }
        }
    </script>
</body>
</html>
